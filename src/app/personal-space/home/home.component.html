<main class="
    grid md:grid-cols-3 xl:grid-cols-3 
    items-center justify-center 
    min-h-screen md:min-h-screen xl:min-h-screen"
  >
  <header class="
    flex flex-col items-center justify-center 
    min-h-screen md:min-h-auto xl:min-h-auto 
    h-auto md:h-screen xl:h-screen"
    >
    <div class="flex flex-col justify-center items-center gap-3">
      <h1 class="text-2xl md:text-3xl xl:text-4xl font-bold text-center">
        Willkommen<br/>
        <span data-testid="home-username">{{ this.username() }}</span>!
      </h1>
      <div class="avatar indicator">
        <div class="ring-primary ring-offset-base-100 w-36 rounded-full ring-2 ring-offset-2">
          <img alt="profil-bild"
            src="{{ this.avatarName() | avatarImage}}" />
        </div>
        <a type="button" 
          class="indicator-item indicator-bottom indicator-end reme-mouse-pointer"
          data-testid="home-open-avatar-dialog-button"
          onclick="avatarDialog.showModal()">
          <span class="material-symbols-outlined">ar_on_you</span>
        </a>
      </div>
      <!-- <button type="button">
        <span class="reme-mouse-pointer badge badge-lg badge-warning font-bold">
          @{{ this.username() }}
        </span>
      </button> -->
      <ng-container *ngTemplateOutlet="menu"></ng-container>
      <p class="mt-3">Bisher erstellt:</p>
      <div class="w-full max-w-xs tooltip tooltip-bottom"
        data-testid="home-notifications-tooltip"
        [attr.data-tip]="this.usedNotesTooltip()">
        <input type="range" class="range" step="1"
          data-testid="home-notifications-range"
          min="0" [max]="this.freeNotificationsLimit()"
          [value]="this.notificationsCount()"
          [disabled]="true"/>
          <div class="flex justify-between px-2.5 mt-2 text-xs tooltip">
            @for(num of this.freeNotificationsLimit() | range; track $index) {
              <span>{{ num }}</span>
            }
          </div>
        </div>
    </div>
  </header>

  <section class="h-auto md:h-screen xl:h-screen items-center justify-center col-span-2" #outletContainer>
    @switch (this.selectedTabComponent()) {
      @case (SelectedTab.Stats) {
        <reme-personal-stats></reme-personal-stats>
      }
      @case (SelectedTab.Settings) {
        <reme-personal-settings></reme-personal-settings>
      }
       @default {
        <reme-personal-notes></reme-personal-notes>
       }
    }
  </section>
</main>

<ng-template #menu>
  <nav class="flex flex-col gap-2 mt-2 xl:mt-3">
    <button class="btn btn-md xl:btn-lg"
      [class.btn-soft]="this.selectedTabComponent() === SelectedTab.Notes"
      (click)="selectTab(SelectedTab.Notes)" type="button">
      <span class="material-symbols-outlined">note_stack</span>
      Meine Erinnerungen
    </button>
        <button class="btn btn-md xl:btn-lg"
      [class.btn-soft]="this.selectedTabComponent() === SelectedTab.Stats"
      (click)="selectTab(SelectedTab.Stats)" type="button">
      <span class="material-symbols-outlined">query_stats</span>
      Statistiken
    </button>
    <button class="btn btn-md xl:btn-lg"
      [class.btn-soft]="this.selectedTabComponent() === SelectedTab.Settings"
      (click)="selectTab(SelectedTab.Settings)" type="button">
      <span class="material-symbols-outlined">settings</span>
      Einstellungen
    </button>
    <button class="btn btn-md xl:btn-lg"
      (click)="this.logout()" type="button">
      <span class="material-symbols-outlined">logout</span>
      Abmelden
    </button>
  </nav>
</ng-template>

<reme-avatar-dialog (selectAvatar)="changeAvatar($event)"></reme-avatar-dialog>
