<reme-toast></reme-toast>
<div class="grid lg:grid-cols-2 items-center justify-center min-h-screen">
  <div class="flex flex-col items-center justify-center min-h-screen lg:min-h-auto h-auto lg:h-screen">
    <div class="flex flex-col lg:flex-row items-center lg:justify-end w-full lg:mr-2">
      <img alt="Elefant" class="logo" src="assets/images/logo.svg" width="125" height="125" />
      <div class="wrapper text-center lg:text-left px-4 lg:px-0">
        <h1 class="lg:text-5xl text-2xl font-bold yellow">Willkommen!</h1>
        <p class="lg:text-xl text-base py-1">
          Ich bin <span class="yellow italic">Notify</span> - dein smarter Erinnerungshelfer.<br/>
          Ich gebe dir rechtzeitig Bescheid, wenn deine Notizen fällig sind!<br/>
          Los geht's!
        </p>
        <div class="flex flex-col lg:flex-row gap-2 lg:mt-3 mt-2">
          <a role="button" class="btn lg:btn-lg"
            [routerLink]="[RouterTokens.HOME]" routerLinkActive="btn-soft" [routerLinkActiveOptions]="{ exact: true }"
            (click)="scrollToOutlet()">
            Home</a>
          <a role="button" class="btn lg:btn-lg"
            [routerLink]="[RouterTokens.FREE_NOTIFICATION]" routerLinkActive="btn-soft" [routerLinkActiveOptions]="{ exact: true }"
            (click)="scrollToOutlet()">
            Ausprobieren</a>
          <a role="button" class="btn lg:btn-lg"
            [routerLink]="[RouterTokens.LOGIN]" routerLinkActive="btn-soft" [routerLinkActiveOptions]="{ exact: true }"
            (click)="scrollToOutlet()">
            Dran bleiben</a>
        </div>
      </div>
    </div>
    <div class="fixed flex flex-row items-end p-1 gap-3 left-2 bottom-1 text-sm">
      <div>
        <p>{{ this.env }}</p>
        <p>Version: {{ this.version }}</p>
      </div>
      <div class="submenu flex gap-2">
        <a [routerLink]="[RouterTokens.IMPRESSUM]">Impressum</a>
        <a [routerLink]="[RouterTokens.AGB]">AGB</a>
        <a [routerLink]="[RouterTokens.DATENSCHUTZ]">Datenschutz</a>
        <a [routerLink]="[RouterTokens.PRICING]">Pricing</a>
      </div>
    </div>
   </div>
  <div class="h-auto lg:h-screen items-center justify-center" #outletContainer>
    <router-outlet />
  </div>
  <reme-footer></reme-footer>
</div>
