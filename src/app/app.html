<daisyui-toaster></daisyui-toaster>
<div class="grid grid-cols-2 items-center justify-center min-h-screen">
  <div class="flex flex-col">
    <div class="flex flex-columns items-center justify-end mr-2">
      <img alt="Elefant" class="logo" src="assets/images/logo.svg" width="125" height="125" />
      <div class="wrapper">
        <h1 class="text-5xl font-bold yellow">Willkommen!</h1>
        <p class="text-xl py-1">
          Ich bin <span class="yellow italic">Notify</span> - dein smarter Erinnerungshelfer.<br/>
          Ich gebe dir rechtzeitig Bescheid, wenn deine Notizen fällig sind!<br/>
          Los geht's!
        </p>
        <div class="flex gap-2 mt-3">
          <a role="button" class="btn btn-lg"
            [routerLink]="[RouterTokens.HOME]" routerLinkActive="btn-soft" [routerLinkActiveOptions]="{ exact: true }">
            Home</a>
          <a role="button" class="btn btn-lg"
            [routerLink]="[RouterTokens.ABOUT]" routerLinkActive="btn-soft" [routerLinkActiveOptions]="{ exact: true }">
            About</a>
          <a role="button" class="btn btn-lg"
            [routerLink]="[RouterTokens.FREE_NOTIFICATION]" routerLinkActive="btn-soft" [routerLinkActiveOptions]="{ exact: true }">
            Ausprobieren</a>
        </div>
      </div>
    </div>
    <div class="fixed left-2 bottom-1 p-1 text-sm">
      <p>{{ this.env }}</p>
      <p>Version: {{ this.version }}</p>
    </div>
   </div>
  <div class="items-center justify-center">
    <router-outlet />
  </div>
  <reme-footer></reme-footer>
</div>
