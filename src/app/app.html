<reme-toast></reme-toast>
<div class="
    grid md:grid-cols-2 xl:grid-cols-2 
    items-center justify-center 
    min-h-screen md:min-h-screen xl:min-h-screen"
  >
  <div class="
    flex flex-col items-center justify-center 
    min-h-screen md:min-h-auto xl:min-h-auto 
    h-auto md:h-screen xl:h-screen"
    >
  <div class="
    flex 
    flex-col md:flex-row xl:flex-row 
    items-center 
    w-full 
    md:justify-center xl:justify-center 
    md:mr-1 xl:mr-2 
    md:grow xl:grow"
    >
    <img alt="Elefant" class="logo" src="assets/images/logo.svg" width="125" height="125" />
    <div class="
      wrapper 
      text-center md:text-left xl:text-left 
      px-4 md:px-0 xl:px-0"
      >
      <h1 class="text-2xl md:text-3xl xl:text-5xl font-bold yellow">Willkommen!</h1>
      <p class="xl:text-xl text-base py-1">
        Ich bin <span class="yellow italic">Notify</span> - dein smarter Erinnerungshelfer.<br/>
        Ich gebe dir rechtzeitig Bescheid, wenn deine Notizen fällig sind!<br/>
        Los geht's!
      </p>
      <div class="
        flex 
        flex-col md:flex-row xl:flex-row 
        gap-2
        mt-2 xl:mt-3"
        >
        <a role="button" class="btn btn-sm xl:btn-lg"
          [routerLink]="[RouterTokens.HOME]" routerLinkActive="md:btn-soft" [routerLinkActiveOptions]="{ exact: true }"
          (click)="scrollToOutlet()">
          Home</a>
        <a role="button" class="btn btn-sm xl:btn-lg"
          [routerLink]="[RouterTokens.FREE_NOTIFICATION]" routerLinkActive="md:btn-soft" [routerLinkActiveOptions]="{ exact: true }"
          (click)="scrollToOutlet()">
          Ausprobieren</a>
        <a role="button" class="btn btn-sm xl:btn-lg"
          [routerLink]="[RouterTokens.LOGIN]" routerLinkActive="md:btn-soft" [routerLinkActiveOptions]="{ exact: true }"
          (click)="scrollToOutlet()">
          Dran bleiben</a>
      </div>
    </div>
  </div>
 
  </div>
  <div class="h-auto md:h-screen xl:h-screen items-center justify-center" #outletContainer>
    <router-outlet />
  </div>
  <ng-content *ngTemplateOutlet="submenu"></ng-content>
  <reme-footer class="hidden xl:block"></reme-footer>


<ng-template #submenu>
  <div class="md:absolute md:flex flex-row md:items-end p-1 gap-3 md:left-2 md:bottom-1 text-sm md:w-auto md:px-0 xl:fixed xl:flex xl:flex-row xl:items-end xl:gap-3 xl:left-2 xl:bottom-1 xl:text-sm xl:w-auto xl:px-0">
  <div>
    <p>{{ this.env }}</p>
    <p>Version: {{ this.version }}</p>
  </div>
  <div class="submenu flex flex-row gap-2">
    <a [routerLink]="[RouterTokens.IMPRESSUM]">Impressum</a>
    <a [routerLink]="[RouterTokens.AGB]">AGB</a>
    <a [routerLink]="[RouterTokens.DATENSCHUTZ]">Datenschutz</a>
    <a [routerLink]="[RouterTokens.PRICING]">Pricing</a>
  </div>
  <ng-content *ngTemplateOutlet="contact"></ng-content> 
</div>
</ng-template>

<ng-template #contact>
  <a href="mailto:{{this.contactMail}}" 
    class="tooltip envelope-icon" 
    data-tip="Feedback oder Fragen? Schreib mir gerne!">
    <!-- Geschlossener Umschlag -->
    <svg class="h-[1em] md:h-[1.25em] opacity-50 envelope-closed" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
        <rect width="20" height="16" x="2" y="4" rx="2"></rect>
        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
      </g>
    </svg>
    <!-- Geöffneter Umschlag -->
    <svg class="h-[1em] md:h-[1.25em] opacity-50 envelope-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
        <path d="M22 12v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-8"></path>
        <path d="m2 7 8.97 5.7a1.94 1.94 0 0 0 2.06 0L22 7"></path>
        <path d="M2 7V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v2l-10 6.35L2 7Z"></path>
      </g>
    </svg>
  </a>
  <span class="md:hidden"> Feedback oder Fragen? Schreib mir gerne!</span>
</ng-template>
