<daisyui-toaster></daisyui-toaster>
<div class="grid grid-cols-2 items-center justify-center min-h-screen">
  <div class="flex flex-col">
    <div class="flex flex-columns items-center justify-end">
      <img alt="Elefant" class="logo" src="assets/images/logo.svg" width="125" height="125" />
      <div class="wrapper">
        <h1 class="yellow">Willkommen!</h1>
        <h3>
          Ich bin <span class="yellow italic">Notify</span>
          und geben dir rechtzeitig Bescheid, wenn deine Notizen fällig sind!<br/>
          Los geht's!
        </h3>
        <ul class="menu menu-vertical lg:menu-horizontal bg-base-200 rounded-box">
          <li><a [routerLink]="[RouterTokens.HOME]">Home</a></li>
          <li><a [routerLink]="[RouterTokens.ABOUT]">About</a></li>
          <li><a [routerLink]="[RouterTokens.FREE_NOTIFICATION]">Ausprobieren</a></li>
        </ul>
      </div>
    </div>
    <div class="fixed left-2 bottom-1 p-1 text-sm">
      <p>{{ this.env }}</p>
      <p>Version: {{ this.version }}</p>
    </div>
   </div>
  <div class="items-center justify-center">
    <router-outlet />
  </div>
  <reme-footer></reme-footer>
</div>
