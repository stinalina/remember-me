<div class="flex gap-1 content-center justify-center">
  @let id = this.preId() + '-checkbox';
  <input [attr.data-testid]="this.preId() + '-checkbox'" 
    [id]="id"
    type="checkbox"
    [(ngModel)]="this.value" 
    class="checkbox" />
  <label class="label" [for]="id">
    <ng-content></ng-content>
  </label>
</div>
