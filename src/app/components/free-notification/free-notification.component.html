<section class="hero bg-base-200 min-h-screen md:min-h-screen xl:min-h-screen">
  <div class="hero-content text-center">
    <div class="max-w-md">
      <h1 class="md:text-3xl xl:text-5xl text-2xl font-bold">Notiz erstellen</h1>
      <div class="md:py-3 xl:py-6 py-3">
        <reme-create-notification></reme-create-notification>
      </div>
      @if (this.isMVPMode) {
         <span>👉 Notiz überarbeiten? <a [routerLink]="['/', RouterTokens.LOGIN]" class="reme-link">Anmeldung bald verfügbar!</a></span>
      } @else {
        <span>👉 Notiz überarbeiten? <a [routerLink]="['/', RouterTokens.LOGIN]" class="reme-link">Melde dich noch heute an!</a></span>
      }
    </div>
  </div>
</section>
