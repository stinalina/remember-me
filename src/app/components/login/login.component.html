<div class="hero bg-base-200 min-h-screen md:min-h-auto xl:min-h-screen">
  <div class="hero-content text-center">
    <div class="max-w-md">
      <h1 class="md:text-4xl xl:text-5xl text-2xl font-bold">Einloggen & <br/> Dran bleiben!</h1>
      <div class="md:py-4 xl:py-6 py-3 flex flex-col gap-3">
        <reme-mail></reme-mail>
        <reme-password></reme-password>
         <reme-checkbox preId="login-remember-me">
          Angemeldet bleiben
        </reme-checkbox>
        <button class="btn bg-white md:mx-6 xl:mx-10 mx-2">
          Einloggen
        </button>
      </div>
      <span>👉 Noch nicht dabei?  <a [routerLink]="['/', RouterTokens.REGISTER]" class="reme-link">Registriere dich</a> noch heute!</span>
    </div>
  </div>
</div>
