<main class="
    grid md:grid-cols-2 xl:grid-cols-2 
    items-center justify-center 
    min-h-screen md:min-h-screen xl:min-h-screen"
  >
  <header class="
    flex flex-col items-center justify-center 
    min-h-screen md:min-h-auto xl:min-h-auto 
    h-auto md:h-screen xl:h-screen"
    >
  <div class="
    flex 
    flex-col md:flex-row xl:flex-row 
    items-center 
    w-full 
    md:justify-center xl:justify-center 
    md:mr-1 xl:mr-2 
    md:grow xl:grow"
    >
    <img alt="Elefant" class="logo" src="assets/images/logo.svg" width="125" height="125" />
    <div class="
      wrapper 
      text-center md:text-left xl:text-left 
      px-4 md:px-0 xl:px-0"
      >
      <h1 class="text-2xl md:text-3xl xl:text-5xl font-bold yellow">Willkommen!</h1>
      <p class="xl:text-xl text-base py-1">
        Ich bin <span class="yellow italic">Notify</span> - dein smarter Erinnerungshelfer.<br/>
        Ich gebe dir rechtzeitig Bescheid, wenn deine Notizen fällig sind!<br/>
        Los geht's!
      </p>
      <div class="
        flex 
        flex-col md:flex-row xl:flex-row 
        gap-2
        mt-2 xl:mt-3"
        >
        <a role="button" class="btn btn-sm xl:btn-lg"
          [routerLink]="[RouterTokens.HOME]" routerLinkActive="md:btn-soft" [routerLinkActiveOptions]="{ exact: true }"
          (click)="scrollToOutlet()">
          Home</a>
        <a role="button" class="btn btn-sm xl:btn-lg"
          [routerLink]="[RouterTokens.FREE_NOTIFICATION]" routerLinkActive="md:btn-soft" [routerLinkActiveOptions]="{ exact: true }"
          (click)="scrollToOutlet()">
          Ausprobieren</a>
        <a role="button" class="btn btn-sm xl:btn-lg"
          [routerLink]="[RouterTokens.LOGIN]" routerLinkActive="md:btn-soft" [routerLinkActiveOptions]="{ exact: true }"
          (click)="scrollToOutlet()">
          Dran bleiben</a>
      </div>
      @if (this.showThemeToggle) {
        <reme-theme-toggle></reme-theme-toggle>
      } 
    </div>
  </div>
  </header>

  <section class="h-auto md:h-screen xl:h-screen items-center justify-center" #outletContainer>
    <router-outlet name="landing-page-outlet"></router-outlet>
  </section>
</main>
