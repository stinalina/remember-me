<reme-content-frame>
  <div class="max-w-md">
    <h1 class="md:text-3xl xl:text-5xl text-2xl font-bold">{{ this.currentSlogan().title}}</h1>
    <div class="md:py-4 xl:py-6 py-3">
      <p>{{ this.currentSlogan().description }}</p>
      <br/>
      <p>{{ this.currentSlogan().fazit }}</p>
    </div>
    <progress class="progress w-full md:w-48 xl:w-56" [value]="this.progressPercentage()" max="100"></progress>
  </div>
</reme-content-frame>
