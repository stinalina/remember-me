mutation InsertNotification($objects: [Notification_insert_input!]!) {
  insert_Notification(objects: $objects) {
    affected_rows
  }
}

mutation DeleteNotificationById($id: uuid!) {
  delete_Notification_by_pk(Id: $id) {
    Id
  }
}

query GetNotificationByUserId($userId: uuid) {
  Notification(order_by: {CreatedAt: desc}, where: {UserId: {_eq: $userId}}) {
    Content
    CreatedAt
    Subject
    RememberCount
    Id
    DueDate
  }
}
