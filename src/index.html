<!doctype html>
<html lang="de" data-theme="caramellatte">
<head>
  <meta charset="utf-8">
  <title>RememberMe</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="./assets/images/pen_pencil.svg">
  <style>
    .floatingchat-container-wrap,
    .floatingchat-container-wrap-mobi {
      left: auto !important;
      right: calc(50% - 90px) !important; /* half of the button width (180px) to center it */
    }
    .floating-chat-kofi-popup-iframe,
    .floating-chat-kofi-popup-iframe-mobi {
      left: auto !important;
      right: calc(50% - 164px) !important; /* half of the popup width (328px) to center it */
    }
  </style>
</head>
<body>
  <reme-root></reme-root>
  
  <script src='https://storage.ko-fi.com/cdn/scripts/overlay-widget.js'></script>
  <script>
    kofiWidgetOverlay.draw('stinaboehmig', {
      'type': 'floating-chat',
      'floating-chat.donateButton.text': 'Support me',
      'floating-chat.donateButton.background-color': '#fcbf47',
      'floating-chat.donateButton.text-color': '#323842'
    });
  </script>
</body>
</html>
