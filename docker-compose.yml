version: "3.8"
services:
  postgres:
    image: postgres:15.14-alpine
    container_name: reme-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: remember_me_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  hasura:
    image: notifyregistry.azurecr.io/hasura:latest
    container_name: reme-hasura
    ports:
      - "8081:8080"
    environment:
      DB_SCHEMA: dev
      HASURA_GRAPHQL_DATABASE_URL: postgres://admin:admin@host.docker.internal:5432/remember_me_db
      ## enable the console served by server
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      ## uncomment next line to run console offline (i.e load console assets from server instead of CDN)
      # HASURA_GRAPHQL_CONSOLE_ASSETS_DIR: /srv/console-assets
      HASURA_GRAPHQL_DB_URL_FROM_ENV: "true"
      ## uncomment next line to set an admin secret
      # HASURA_GRAPHQL_ADMIN_SECRET: myadminsecretkey
    depends_on:
      - postgres
    
volumes:
  pgdata:
